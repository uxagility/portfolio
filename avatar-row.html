<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>

<script type="text/javascript">

$(document).ready(function() {
// determine the task and design treatment
//	var task="cList";
	var task="avatar7";
	var png="avatar_row.png";
	var png="ar_sticky.png";

// disable the Confirmit forward button
	$("#forwardbutton").hide();
	
// create the Subscriptions background image
//	var baseURL="https://gsurveyresources.appspot.com/avatar-row/";
	var baseURL="";
	var imageURL=baseURL+png;
	$("#subscriptions").css("background-image","url(" + imageURL + ")").css("background-size","250px").css("background-repeat","no-repeat");

// define CSS positions and sizes for the elements that differ between the designs
	if (png=="avatar_row.png") {
		$("#cList").css("top","50px").css("left","227px").css("width","20px").css("height","20px");
		$("#videosPosts").css("top","84px");
		$("#avatarRow").css("top","43px").css("width","225px");
		$("#childContainer").css("left","-122px").css("width","469px");
		$("#child").css("left","122px");
	}
	else {
		$("#cList").css("top","40px").css("left","175px").css("width","71px").css("height","20px");
		$("#videosPosts").css("top","40px");
		$("#avatarRow").css("top","67px").css("width","250px");
		$("#childContainer").css("left","-97px").css("width","445px");
		$("#child").css("left","97px");
	}

// define target depending on the task
	if (task=="cList") {
		var target="#cList";
	}
	else {
		var target="#avatar7";
	}
	$(target).addClass("target");

// initialise variables
	var clickString="";
	var errorCount=0;
	var startTime;

// turn the phone on, start the task timer, and disable the on switch
	$("#onSwitch").click(function() {
		startTime=new Date().getTime();
		$("#subscriptions").fadeIn("fast");
		$("#onSwitch").hide();
	});

// when a hotspot is clicked, capture it
	$(".hotspot").click(function() {

// capture time to first click
		if (clickString=="") {
			$("#firstClickTime").attr("value",getTimeDiff());
		}
// build the click string
		clickString+=this.id+",";

// handle correct and incorrect actions
		if ($(this).hasClass("target")) {
			taskComplete();
		}
		else {
			tryAgain();
		}
	});

// define the draggable properties for Avatar Row
    $("#child").draggable({ 
    	cursor: "move",
    	containment: "parent",
		start: function() {
			clickString+="dragStart,";
			if ($("#dragStart").val()=="") {
				$("#dragStart").attr("value",getTimeDiff());
			}
	    },
	    stop: function() {
	        if (task=="cList" && $("#child").position().left<=0) {
				clickString+="dragStop,";
				taskComplete();
			}		
	    }
	});

// capture data on task completion
	taskComplete=function() {
		$("#clicked").attr("value",clickString);
		$("#timeTaken").attr("value",getTimeDiff());
		$("#errorCount").attr("value",errorCount);
alert("Correct! Time taken: " + $("#timeTaken").val() +  ", Drag start: " + $("#dragStart").val() + ", First click: " + $("#firstClickTime").val() + ", Clicked: " + clickString + ", Error count: " + errorCount);
		$("form#ctlform").submit();
	}

// handle incorrect clicks
	tryAgain=function() {
		$("#try_again").fadeIn("fast").delay(250).fadeOut("fast");
		errorCount++;
	}

// calculate time taken for various events
	getTimeDiff=function() {
		var now=new Date().getTime();
		var timeDiff=now-startTime;
		return timeDiff;
	}
});
</script>
